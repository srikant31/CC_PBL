<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Python Code Analyzer</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            padding: 2rem;
            background-color: #f8f9fa;
        }
        textarea {
            font-family: monospace;
            min-height: 3000px;
        }
        pre {
            white-space: pre-wrap;
            word-wrap: break-word;
            background-color: #e9ecef;
            padding: 1rem;
            border-radius: 0.5rem;
        }
        .section-title {
            margin-top: 1.5rem;
            font-weight: bold;
            font-size: 1.25rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="mb-4">🧪 Python Code Analyzer & Test Coverage</h1>
        <form method="post">
            <div class="mb-3">
                <label for="code" class="form-label">Paste Your Python Code:</label>
                <textarea id="code" name="code" class="form-control" required>{{ code }}</textarea>
            </div>
            <div class="form-check mb-3">
                <input class="form-check-input" type="checkbox" name="dynamic" id="dynamic" {{ dynamic_checked }}>
                <label class="form-check-label" for="dynamic">
                    Include dynamic profiling (memory usage & time)
                </label>
            </div>
            <div class="form-check mb-3">
                <input class="form-check-input" type="checkbox" name="security" id="security" {{ security_checked }}>
                <label class="form-check-label" for="security">
                    Include security scan (vulnerabilities)
                </label>
            </div>
            <button type="submit" class="btn btn-primary">Analyze Code</button>
        </form>

        {% if result %}
        <div class="section-title">🧠 Code Analysis:</div>
        <div class="result-section">
            <pre>{{ result | safe }}</pre>
        </div>
        {% endif %}

        {% if test_results %}
        <div class="section-title">✅ Test Results:</div>
        <pre>{{ test_results }}</pre>
        {% endif %}

        {% if coverage_report %}
        <div class="section-title">📈 Coverage Report:</div>
        <pre>{{ coverage_report }}</pre>
        {% endif %}
    </div>
</body>
</html>
